<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridger Western Trainer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    overflow:hidden;
    background:#0f0f0f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Idiomas */
#languageBox{
    position:absolute;
    top:15px;
    left:15px;
    display:flex;
    gap:10px;
}

.langBtn{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
}

/* Modos */
#modeBox{
    position:absolute;
    top:15px;
    right:15px;
    display:flex;
    gap:10px;
}

.modeBtn{
    padding:10px 16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    font-weight:bold;
    background:#2a2a2a;
    color:white;
    transition:0.2s;
}

.modeBtn:hover{
    transform:scale(1.05);
}

.activeMode{
    background:#ffffff;
    color:black;
}

#game{
    text-align:center;
}

h1{
    margin-bottom:20px;
    font-size:42px;
}

#circle{
    width:180px;
    height:180px;
    border-radius:50%;
    background:#1f1f1f;
    border:6px solid #ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:80px;
    font-weight:bold;
    transition:0.15s;
    margin:auto;
}

/* Barra */
#progressContainer{
    width:320px;
    height:28px;
    background:#222;
    border-radius:30px;
    overflow:hidden;
    margin:25px auto 0;
    border:2px solid white;
}

#progressBar{
    width:0%;
    height:100%;
    background:#1aff75;
    transition:0.2s;
}

#progressText{
    margin-top:10px;
    font-size:22px;
}

.correct{
    background:#1aff75 !important;
    transform:scale(1.1);
}

.wrong{
    background:#ff2e2e !important;
    transform:scale(0.95);
}

#info{
    margin-top:25px;
    font-size:24px;
    line-height:1.8;
}

#restart{
    margin-top:25px;
    padding:14px 30px;
    border:none;
    border-radius:12px;
    font-size:22px;
    cursor:pointer;
    display:none;
}

.shake{
    animation:shake 0.18s;
}

@keyframes shake{
    0%{transform:translate(0px);}
    25%{transform:translate(10px);}
    50%{transform:translate(-10px);}
    75%{transform:translate(6px);}
    100%{transform:translate(0px);}
}
</style>
</head>
<body>

<!-- Idiomas -->
<div id="languageBox">
    <button class="langBtn" onclick="setLanguage('pt')">PT</button>
    <button class="langBtn" onclick="setLanguage('es')">ES</button>
    <button class="langBtn" onclick="setLanguage('en')">EN</button>
</div>

<!-- Modos -->
<div id="modeBox">
    <button class="modeBtn activeMode"
        onclick="setMode('arrow',35,this)">
        Arrow Shard
    </button>

    <button class="modeBtn"
        onclick="setMode('leg',21,this)">
        Rust Mares Leg
    </button>

    <button class="modeBtn"
        onclick="setMode('chest',10,this)">
        Chest
    </button>
</div>

<div id="game">
    <h1 id="title">BRIDGER WESTERN TRAINER</h1>

    <div id="circle">R</div>

    <!-- Barra -->
    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>

    <div id="progressText">
        0 / 35
    </div>

    <div id="info">
        <span id="errorsLabel">Erros</span>: <span id="errors">0</span>/2 <br>
        <span id="streakLabel">Acertos</span>: <span id="streak">0</span>/4 <br>
        <span id="resetsLabel">Resets restantes</span>: <span id="resets">2</span>
    </div>

    <button id="restart">Reiniciar</button>
</div>

<script>
const keys = ["R","T","F","G"];

const circle = document.getElementById("circle");
const errorsText = document.getElementById("errors");
const streakText = document.getElementById("streak");
const resetsText = document.getElementById("resets");
const restartBtn = document.getElementById("restart");

const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");

let currentKey = "";
let errors = 0;
let streak = 0;
let resets = 2;
let canReset = false;

let playing = true;
let timer;

/* Progressão */
let progress = 0;
let maxProgress = 35;
let currentMode = "arrow";

/* Traduções */
const translations = {
    pt: {
        title: "BRIDGER WESTERN TRAINER",
        errors: "Erros",
        streak: "Acertos",
        resets: "Resets restantes",
        restart: "Reiniciar"
    },

    es: {
        title: "BRIDGER WESTERN TRAINER",
        errors: "Errores",
        streak: "Aciertos",
        resets: "Reinicios restantes",
        restart: "Reiniciar"
    },

    en: {
        title: "BRIDGER WESTERN TRAINER",
        errors: "Errors",
        streak: "Hits",
        resets: "Remaining resets",
        restart: "Restart"
    }
};

function setLanguage(lang){

    document.getElementById("title").textContent =
        translations[lang].title;

    document.getElementById("errorsLabel").textContent =
        translations[lang].errors;

    document.getElementById("streakLabel").textContent =
        translations[lang].streak;

    document.getElementById("resetsLabel").textContent =
        translations[lang].resets;

    restartBtn.textContent =
        translations[lang].restart;
}

function setMode(mode, max, button){

    currentMode = mode;
    maxProgress = max;

    progress = 0;

    updateProgress();

    document.querySelectorAll(".modeBtn")
        .forEach(btn => btn.classList.remove("activeMode"));

    button.classList.add("activeMode");
}

function updateProgress(){

    const percent = (progress / maxProgress) * 100;

    progressBar.style.width = percent + "%";

    progressText.textContent =
        progress + " / " + maxProgress;
}

function randomKey(){
    return keys[Math.floor(Math.random()*keys.length)];
}

function nextRound(){
    clearTimeout(timer);

    currentKey = randomKey();
    circle.textContent = currentKey;

    circle.classList.remove("correct");
    circle.classList.remove("wrong");

    timer = setTimeout(() => {
        lose();
    }, 1000);
}

function lose(){
    playing = false;

    clearTimeout(timer);

    circle.classList.add("wrong");

    restartBtn.style.display = "inline-block";
}

function winEffect(){
    document.body.classList.add("shake");

    setTimeout(() => {
        document.body.classList.remove("shake");
    }, 180);
}

document.addEventListener("keydown",(e)=>{
    if(!playing) return;

    const key = e.key.toUpperCase();

    if(key === currentKey){

        streak++;

        progress++;

        updateProgress();

        if(progress >= maxProgress){
            progress = maxProgress;
            updateProgress();
        }

        streakText.textContent = streak;

        circle.classList.remove("wrong");
        circle.classList.add("correct");

        winEffect();

        if(errors > 0){
            canReset = true;
        }

        if(streak >= 4 && canReset && resets > 0){

            errors = 0;
            streak = 0;

            resets--;

            canReset = false;

            errorsText.textContent = errors;
            streakText.textContent = streak;
            resetsText.textContent = resets;
        }

        setTimeout(()=>{
            nextRound();
        },150);

    }else if(keys.includes(key)){

        errors++;

        streak = 0;

        errorsText.textContent = errors;
        streakText.textContent = streak;

        circle.classList.remove("correct");
        circle.classList.add("wrong");

        if(errors >= 2){
            lose();
        }
    }
});

restartBtn.addEventListener("click",()=>{

    errors = 0;
    streak = 0;
    resets = 2;
    canReset = false;

    progress = 0;

    errorsText.textContent = errors;
    streakText.textContent = streak;
    resetsText.textContent = resets;

    updateProgress();

    playing = true;

    restartBtn.style.display = "none";

    nextRound();
});

setLanguage("pt");
updateProgress();
nextRound();
</script>

</body>
</html>
