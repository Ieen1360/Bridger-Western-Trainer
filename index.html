<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QTE Trainer</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        overflow:hidden;
        background:#0f0f0f;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    #game{
        text-align:center;
    }

    h1{
        margin-bottom:20px;
        font-size:42px;
    }

    #circle{
        width:180px;
        height:180px;
        border-radius:50%;
        background:#1f1f1f;
        border:6px solid #ffffff;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:80px;
        font-weight:bold;
        transition:0.15s;
        margin:auto;
    }

    .correct{
        background:#1aff75 !important;
        transform:scale(1.1);
    }

    .wrong{
        background:#ff2e2e !important;
        transform:scale(0.95);
    }

    #info{
        margin-top:25px;
        font-size:24px;
    }

    #restart{
        margin-top:25px;
        padding:14px 30px;
        border:none;
        border-radius:12px;
        font-size:22px;
        cursor:pointer;
        display:none;
    }

    .shake{
        animation:shake 0.18s;
    }

    @keyframes shake{
        0%{transform:translate(0px);}
        25%{transform:translate(10px);}
        50%{transform:translate(-10px);}
        75%{transform:translate(6px);}
        100%{transform:translate(0px);}
    }
</style>
</head>
<body>

<div id="game">
    <h1>QTE TRAINER</h1>

    <div id="circle">R</div>

    <div id="info">
        Erros: <span id="errors">0</span>/2
    </div>

    <button id="restart">Reiniciar</button>
</div>

<script>
const keys = ["R","T","F","G"];

const circle = document.getElementById("circle");
const errorsText = document.getElementById("errors");
const restartBtn = document.getElementById("restart");

let currentKey = "";
let errors = 0;
let playing = true;
let timer;

function randomKey(){
    return keys[Math.floor(Math.random()*keys.length)];
}

function nextRound(){
    clearTimeout(timer);

    currentKey = randomKey();
    circle.textContent = currentKey;

    circle.classList.remove("correct");
    circle.classList.remove("wrong");

    timer = setTimeout(() => {
        lose();
    }, 1000);
}

function lose(){
    playing = false;

    circle.classList.add("wrong");

    restartBtn.style.display = "inline-block";
}

function winEffect(){
    document.body.classList.add("shake");

    setTimeout(() => {
        document.body.classList.remove("shake");
    }, 180);
}

document.addEventListener("keydown",(e)=>{
    if(!playing) return;

    const key = e.key.toUpperCase();

    if(key === currentKey){

        circle.classList.remove("wrong");
        circle.classList.add("correct");

        winEffect();

        setTimeout(()=>{
            nextRound();
        },150);

    }else if(keys.includes(key)){

        errors++;

        errorsText.textContent = errors;

        circle.classList.remove("correct");
        circle.classList.add("wrong");

        if(errors >= 2){
            lose();
        }
    }
});

restartBtn.addEventListener("click",()=>{
    errors = 0;
    errorsText.textContent = errors;

    playing = true;

    restartBtn.style.display = "none";

    nextRound();
});

nextRound();
</script>

</body>
</html>
